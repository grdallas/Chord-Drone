<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Drone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0e1a;
            color: #f9fafb;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #374151;
        }

        h1 {
            font-size: 2.5rem;
            color: #f59e0b;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #9ca3af;
        }

        .card {
            background: #151b2e;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: #d1d5db;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .sound-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .sound-btn {
            padding: 0.875rem;
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 8px;
            color: #f9fafb;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sound-btn:hover {
            border-color: #f59e0b;
        }

        .sound-btn.active {
            background: #f59e0b;
            border-color: #f59e0b;
            color: #0a0e1a;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #1f2937;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
            border: none;
        }

        .range-value {
            color: #f59e0b;
            font-weight: 700;
            float: right;
        }

        .btn {
            width: 100%;
            padding: 1.25rem;
            background: #f59e0b;
            color: #0a0e1a;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn:hover {
            background: #fbbf24;
            transform: translateY(-1px);
        }

        .toggle-btn {
            width: 100%;
            padding: 1rem;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #f9fafb;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            border-color: #f59e0b;
        }

        .toggle-btn.active {
            background: rgba(245, 158, 11, 0.2);
            border-color: #f59e0b;
            color: #f59e0b;
        }

        .chord-display {
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .chord-symbol {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .chord-symbol.hidden {
            color: #6b7280;
            font-size: 2rem;
        }

        .chord-notes {
            font-size: 0.9rem;
            color: #9ca3af;
            font-family: monospace;
        }

        .status {
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chord Drone</h1>
            <p class="subtitle">Practice over random jazz chords</p>
        </div>

        <div class="card">
            <div class="control-group">
                <label>Sound</label>
                <div class="sound-grid">
                    <button class="sound-btn active" data-sound="strings">Strings</button>
                    <button class="sound-btn" data-sound="pad">Pad</button>
                    <button class="sound-btn" data-sound="organ">Organ</button>
                    <button class="sound-btn" data-sound="bells">Bells</button>
                </div>
            </div>

            <div class="control-group">
                <label>
                    Duration 
                    <span class="range-value"><span id="durVal">15</span>s</span>
                </label>
                <input type="range" id="durSlider" min="5" max="60" value="15" step="5">
            </div>

            <button class="btn" id="startBtn">Start</button>
            <button class="toggle-btn" id="showBtn">Show Chords</button>
        </div>

        <div class="card">
            <div class="chord-display">
                <div class="chord-symbol hidden" id="symbol">—</div>
                <div class="chord-notes" id="notes"></div>
            </div>
            <div class="status" id="status">Click Start</div>
        </div>
    </div>

    <script>
        let ctx, oscs = [], gains = [], master, dry, wet, reverb;
        let playing = false, chord = null, timer = null;
        let dur = 15, timeLeft = 15, sound = 'strings', show = false;

        const roots = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
        const types = [
            {n:'maj7',i:[0,4,7,11]},{n:'maj9',i:[0,4,7,11,14]},
            {n:'maj7#11',i:[0,4,7,11,18]},{n:'6/9',i:[0,4,7,9,14]},
            {n:'min7',i:[0,3,7,10]},{n:'min9',i:[0,3,7,10,14]},
            {n:'min11',i:[0,3,7,10,14,17]},{n:'7',i:[0,4,7,10]},
            {n:'9',i:[0,4,7,10,14]},{n:'13',i:[0,4,7,10,14,21]},
            {n:'7#11',i:[0,4,7,10,18]},{n:'7b9',i:[0,4,7,10,13]},
            {n:'7#9',i:[0,4,7,10,15]},{n:'7alt',i:[0,4,6,10,13]},
            {n:'min7b5',i:[0,3,6,10]},{n:'dim7',i:[0,3,6,9]}
        ];

        const freq = s => 130.81 * Math.pow(2, s/12);

        const configs = {
            strings: {w1:'sawtooth',w2:'triangle',a:1.2,f:1200},
            pad: {w1:'sine',w2:'sine',a:0.8,f:2000},
            organ: {w1:'sawtooth',w2:'square',a:0.05,f:3000},
            bells: {w1:'sine',w2:'triangle',a:0.01,f:4000}
        };

        function init() {
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                master = ctx.createGain();
                master.gain.value = 0.7;
                dry = ctx.createGain();
                wet = ctx.createGain();
                reverb = ctx.createConvolver();
                
                const sr = ctx.sampleRate, len = sr * 2.5;
                const imp = ctx.createBuffer(2, len, sr);
                const L = imp.getChannelData(0), R = imp.getChannelData(1);
                for (let i = 0; i < len; i++) {
                    const e = Math.exp(-(i/len) * 2.5);
                    L[i] = (Math.random() * 2 - 1) * e;
                    R[i] = (Math.random() * 2 - 1) * e;
                }
                reverb.buffer = imp;
                
                dry.gain.value = 0.4;
                wet.gain.value = 0.6;
                dry.connect(master);
                wet.connect(reverb);
                reverb.connect(master);
                master.connect(ctx.destination);
            }
        }

        function gen() {
            const r = roots[~~(Math.random() * 12)];
            const t = types[~~(Math.random() * types.length)];
            const ro = roots.indexOf(r);
            let v = [t.i[0] - 12, ...t.i];
            if (t.i.length >= 3) v.push(t.i[Math.random() > 0.5 ? 1 : 2] + 12);
            if (Math.random() > 0.6) v.push(t.i[0] + 24);
            return {
                sym: r + t.n,
                freqs: v.map(i => freq(ro + i)),
                notes: v.map(i => roots[(ro + i) % 12]).join(' - ')
            };
        }

        function play(ch) {
            stop();
            oscs = []; gains = [];
            const now = ctx.currentTime, cfg = configs[sound];
            
            ch.freqs.forEach(f => {
                [-8, 0, 8].forEach(d => {
                    const o1 = ctx.createOscillator(), o2 = ctx.createOscillator();
                    const og = ctx.createGain(), ng = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    
                    o1.type = cfg.w1; o2.type = cfg.w2;
                    o1.frequency.value = o2.frequency.value = f;
                    o1.detune.value = o2.detune.value = d;
                    og.gain.value = 0.5;
                    flt.type = 'lowpass';
                    flt.frequency.value = cfg.f;
                    flt.Q.value = 1;
                    
                    const v = Math.min(0.15 / Math.sqrt(f / 200), 0.2);
                    ng.gain.setValueAtTime(0, now);
                    ng.gain.linearRampToValueAtTime(v, now + cfg.a);
                    
                    o1.connect(og); o2.connect(og);
                    og.connect(flt); flt.connect(ng);
                    ng.connect(dry); ng.connect(wet);
                    o1.start(now); o2.start(now);
                    oscs.push(o1, o2); gains.push(ng);
                });
            });
        }

        function stop() {
            oscs.forEach((o, i) => {
                const gi = ~~(i / 2);
                if (gi < gains.length) {
                    const g = gains[gi], now = ctx.currentTime;
                    g.gain.cancelScheduledValues(now);
                    g.gain.setValueAtTime(g.gain.value, now);
                    g.gain.linearRampToValueAtTime(0, now + 0.8);
                    o.stop(now + 0.8);
                }
            });
            oscs = []; gains = [];
        }

        function next() {
            chord = gen();
            playing && (play(chord), startTimer());
            updateDisplay();
        }

        function updateDisplay() {
            if (show && chord) {
                symbol.textContent = chord.sym;
                symbol.classList.remove('hidden');
                notes.textContent = chord.notes;
            } else {
                symbol.textContent = '???';
                symbol.classList.add('hidden');
                notes.textContent = '';
            }
        }

        function startTimer() {
            timer && clearInterval(timer);
            timeLeft = dur;
            timer = setInterval(() => {
                timeLeft--;
                status.textContent = `Next in ${timeLeft}s`;
                if (timeLeft <= 0) next();
            }, 1000);
        }

        document.querySelectorAll('.sound-btn').forEach(b => {
            b.onclick = () => {
                document.querySelectorAll('.sound-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                sound = b.dataset.sound;
                playing && chord && play(chord);
            };
        });

        startBtn.onclick = () => {
            if (!playing) {
                init();
                playing = true;
                startBtn.textContent = 'Stop';
                next();
            } else {
                playing = false;
                startBtn.textContent = 'Start';
                stop();
                timer && clearInterval(timer);
                status.textContent = 'Stopped';
            }
        };

        showBtn.onclick = () => {
            show = !show;
            showBtn.classList.toggle('active');
            updateDisplay();
        };

        durSlider.oninput = e => {
            dur = +e.target.value;
            durVal.textContent = dur;
        };
    </script>
</body>
</html>
