<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chord Drone">
    <title>Chord Drone</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* ── Global ─────────────────────────────────────────────────────── */
        :root {
            --paper: #f5f0e8;
            --paper-dark: #ece4d0;
            --ink: #1a1510;
            --ink-light: #3d2e1e;
            --ink-muted: #7a6a56;
            --border: #c8b89a;
            --amber: #c8841a;
            --red: #8b2020;
            --blue: #1a3060;
            --green: #1a5c2a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Libre Baskerville', serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── Main Container ─────────────────────────────────────────────── */
        #drone {
            padding: 1.5rem 1rem 3rem;
            max-width: 640px;
            margin: 0 auto;
            background:
                radial-gradient(ellipse at 80% 15%, rgba(26,48,96,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 85%, rgba(26,92,42,0.05) 0%, transparent 50%),
                var(--paper);
            min-height: 100vh;
        }

        /* ── Header ─────────────────────────────────────────────────────── */
        .tool-header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .tool-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.01em;
        }

        /* ── Cards ──────────────────────────────────────────────────────── */
        .card {
            border: 2px solid var(--ink);
            border-radius: 4px;
            padding: 1.2rem 1rem;
            margin-bottom: 1.2rem;
        }
        .control-group { margin-bottom: 1.2rem; }
        .control-group:last-child { margin-bottom: 0; }

        /* ── Labels ─────────────────────────────────────────────────────── */
        label.section-label {
            display: block;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--ink-muted);
            margin-bottom: 0.5rem;
        }

        /* ── Sound Buttons ──────────────────────────────────────────────── */
        .sound-grid { 
            display: grid; 
            grid-template-columns: repeat(2,1fr); 
            gap: 0.5rem; 
        }
        .sound-btn {
            padding: 0.5rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.75rem;
            color: var(--ink-light);
            cursor: pointer;
            transition: all 0.12s;
        }
        .sound-btn:hover { 
            background: var(--paper-dark); 
            border-color: var(--ink); 
        }
        .sound-btn.active { 
            background: var(--ink); 
            color: var(--paper); 
            border-color: var(--ink); 
            font-weight: 700; 
        }

        /* ── Range Slider ───────────────────────────────────────────────── */
        input[type="range"] { 
            width: 100%; 
            height: 3px; 
            -webkit-appearance: none; 
            background: var(--border); 
            border-radius: 2px; 
            outline: none; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 14px; 
            height: 14px; 
            border-radius: 50%; 
            background: var(--ink); 
            cursor: pointer; 
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px; 
            height: 14px; 
            border-radius: 50%; 
            background: var(--ink); 
            cursor: pointer;
            border: none;
        }
        .range-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 0.4rem; 
        }
        .range-val { 
            font-size: 0.75rem; 
            color: var(--amber); 
            font-weight: 700; 
        }

        /* ── Checkboxes ─────────────────────────────────────────────────── */
        .chord-checks { 
            display: flex; 
            flex-direction: column; 
            gap: 0.35rem; 
        }
        .check-label { 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            font-size: 0.78rem; 
            color: var(--ink-muted); 
            cursor: pointer; 
        }
        .check-label:hover { color: var(--ink); }
        .check-label input { 
            accent-color: var(--amber); 
            cursor: pointer; 
        }

        /* ── Buttons ────────────────────────────────────────────────────── */
        .drone-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--ink);
            color: var(--paper);
            border: none;
            border-radius: 4px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 0.6rem;
        }
        .drone-btn:hover { 
            background: var(--amber); 
            color: var(--ink); 
        }
        .show-btn {
            width: 100%;
            padding: 0.7rem;
            background: transparent;
            color: var(--ink);
            border: 1.5px solid var(--border);
            border-radius: 4px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .show-btn:hover { 
            border-color: var(--ink); 
            background: var(--paper-dark); 
        }
        .show-btn.active { 
            background: rgba(200,132,26,0.08); 
            border-color: var(--amber); 
            color: var(--amber); 
        }

        /* ── Chord Display ──────────────────────────────────────────────── */
        .chord-display {
            border: 2px solid var(--ink);
            border-radius: 4px;
            padding: 1.8rem 1rem;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .chord-symbol {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 0.4rem;
        }
        .chord-symbol.hidden { 
            color: var(--border); 
            font-size: 2rem; 
        }
        .chord-notes { 
            font-size: 0.75rem; 
            color: var(--ink-muted); 
            letter-spacing: 0.06em; 
        }
        .drone-status { 
            text-align: center; 
            font-size: 0.72rem; 
            color: var(--ink-muted); 
            font-style: italic; 
        }
    </style>
</head>
<body>

<div id="drone">
    <div class="tool-header">
        <h1>Chord Drone</h1>
    </div>

    <div class="card">
        <div class="control-group">
            <label class="section-label">Sound</label>
            <div class="sound-grid">
                <button class="sound-btn active" data-sound="strings">Strings</button>
                <button class="sound-btn" data-sound="pad">Pad</button>
                <button class="sound-btn" data-sound="rhodes">Pad 2</button>
                <button class="sound-btn" data-sound="bells">Bells</button>
            </div>
        </div>
        <div class="control-group">
            <div class="range-row">
                <label class="section-label" style="margin:0">Duration</label>
                <span class="range-val"><span id="durVal">15</span>s</span>
            </div>
            <input type="range" id="durSlider" min="5" max="60" value="15" step="5">
        </div>
        <div class="control-group">
            <label class="section-label">Chord Types</label>
            <div class="chord-checks">
                <label class="check-label"><input type="checkbox" class="chord-check" value="major" checked><span>Major (maj7, maj9, 6/9)</span></label>
                <label class="check-label"><input type="checkbox" class="chord-check" value="minor" checked><span>Minor (min7, min9, min11)</span></label>
                <label class="check-label"><input type="checkbox" class="chord-check" value="dominant" checked><span>Dominant (7, 9, 13, 7#11)</span></label>
                <label class="check-label"><input type="checkbox" class="chord-check" value="altered" checked><span>Altered (7b9, 7#9, 7alt)</span></label>
                <label class="check-label"><input type="checkbox" class="chord-check" value="diminished" checked><span>Diminished (min7b5, dim7)</span></label>
            </div>
        </div>
        <button class="drone-btn" id="droneStartBtn">Start</button>
        <button class="show-btn" id="droneShowBtn">Show Chords</button>
    </div>

    <div class="card">
        <div class="chord-display">
            <div class="chord-symbol hidden" id="droneSymbol">—</div>
            <div class="chord-notes" id="droneNotes"></div>
        </div>
        <div class="drone-status" id="droneStatus">Click Start</div>
    </div>
</div>

<script>
    // ── iOS audio unlock ───────────────────────────────────────────────────
    function unlockAudio(ctx) {
        if (!ctx) return;
        const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        ctx.resume();
    }
    document.addEventListener('touchstart', () => {
        if (droneCtx) unlockAudio(droneCtx);
    }, { once: true });

    // ══════════════════════════════════════════════════════════════════════
    // CHORD DRONE
    // ══════════════════════════════════════════════════════════════════════
    let droneCtx, droneOscs=[], droneGains=[], droneMaster, droneDry, droneWet, droneReverb;
    let dronePlaying=false, droneChord=null, droneTimer=null;
    let droneDur=15, droneTimeLeft=15, droneSound='strings', droneShow=false;
    let droneEnabled=new Set(['major','minor','dominant','altered','diminished']);

    const droneRoots=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
    const droneTypes=[
        {n:'maj7',i:[0,4,7,11],c:'major'},{n:'maj9',i:[0,4,7,11,14],c:'major'},
        {n:'maj7#11',i:[0,4,7,11,18],c:'major'},{n:'6/9',i:[0,4,7,9,14],c:'major'},
        {n:'min7',i:[0,3,7,10],c:'minor'},{n:'min9',i:[0,3,7,10,14],c:'minor'},
        {n:'min11',i:[0,3,7,10,14,17],c:'minor'},{n:'7',i:[0,4,7,10],c:'dominant'},
        {n:'9',i:[0,4,7,10,14],c:'dominant'},{n:'13',i:[0,4,7,10,14,21],c:'dominant'},
        {n:'7#11',i:[0,4,7,10,18],c:'dominant'},{n:'7b9',i:[0,4,7,10,13],c:'altered'},
        {n:'7#9',i:[0,4,7,10,15],c:'altered'},{n:'7alt',i:[0,4,6,10,13],c:'altered'},
        {n:'min7b5',i:[0,3,6,10],c:'diminished'},{n:'dim7',i:[0,3,6,9],c:'diminished'}
    ];
    const droneFreq = s => 130.81*Math.pow(2,s/12);
    const droneCfgs = {
        strings:{w1:'sawtooth',w2:'triangle',a:1.2,f:1200},
        pad:{w1:'sine',w2:'sine',a:0.8,f:2000},
        rhodes:{w1:'sine',w2:'triangle',a:0.02,f:2200},
        bells:{w1:'sine',w2:'triangle',a:0.01,f:4000}
    };

    function droneInit() {
        if (!droneCtx) {
            droneCtx = new (window.AudioContext||window.webkitAudioContext)();
            droneMaster=droneCtx.createGain(); droneMaster.gain.value=0.7;
            droneDry=droneCtx.createGain(); droneWet=droneCtx.createGain();
            droneReverb=droneCtx.createConvolver();
            const sr=droneCtx.sampleRate, len=sr*2.5;
            const imp=droneCtx.createBuffer(2,len,sr);
            const L=imp.getChannelData(0), R=imp.getChannelData(1);
            for (let i=0;i<len;i++){const e=Math.exp(-(i/len)*2.5);L[i]=(Math.random()*2-1)*e;R[i]=(Math.random()*2-1)*e;}
            droneReverb.buffer=imp;
            droneDry.gain.value=0.4; droneWet.gain.value=0.6;
            droneDry.connect(droneMaster); droneWet.connect(droneReverb);
            droneReverb.connect(droneMaster); droneMaster.connect(droneCtx.destination);
        }
        if (droneCtx.state==='suspended') droneCtx.resume();
    }

    function droneGen() {
        const avail=droneTypes.filter(t=>droneEnabled.has(t.c));
        if (!avail.length){droneEnabled.add('major');return droneGen();}
        const r=droneRoots[~~(Math.random()*12)];
        const t=avail[~~(Math.random()*avail.length)];
        const ro=droneRoots.indexOf(r);
        let v=[t.i[0]-12,...t.i];
        if (t.i.length>=3) v.push(t.i[Math.random()>0.5?1:2]+12);
        if (Math.random()>0.6) v.push(t.i[0]+24);
        return {sym:r+t.n, freqs:v.map(i=>droneFreq(ro+i)), notes:v.map(i=>droneRoots[(ro+i)%12]).join(' - ')};
    }

    function dronePlay(ch) {
        droneStop(); droneOscs=[]; droneGains=[];
        const now=droneCtx.currentTime, cfg=droneCfgs[droneSound];
        const isRhodes = droneSound === 'rhodes';
        ch.freqs.forEach(f=>{
            [-8,0,8].forEach(d=>{
                const o1=droneCtx.createOscillator(), o2=droneCtx.createOscillator();
                const og=droneCtx.createGain(), ng=droneCtx.createGain();
                const flt=droneCtx.createBiquadFilter();
                o1.type=cfg.w1; o2.type=cfg.w2;
                o1.frequency.value=o2.frequency.value=f;
                o1.detune.value=o2.detune.value=d;
                og.gain.value=0.5; flt.type='lowpass'; flt.frequency.value=cfg.f; flt.Q.value=1;
                const v=Math.min(0.15/Math.sqrt(f/200),0.2);
                ng.gain.setValueAtTime(0,now);
                ng.gain.linearRampToValueAtTime(v,now+cfg.a);
                o1.connect(og); o2.connect(og); og.connect(flt);
                flt.connect(ng);
                ng.connect(droneDry); ng.connect(droneWet);
                o1.start(now); o2.start(now);
                droneOscs.push(o1,o2); droneGains.push(ng);
            });
        });
    }

    function droneStop() {
        if (!droneCtx) return;
        droneOscs.forEach((o,i)=>{
            const gi=~~(i/2);
            if (gi<droneGains.length){
                const g=droneGains[gi], now=droneCtx.currentTime;
                g.gain.cancelScheduledValues(now);
                g.gain.setValueAtTime(g.gain.value,now);
                g.gain.linearRampToValueAtTime(0,now+0.8);
                o.stop(now+0.8);
            }
        });
        droneOscs=[]; droneGains=[];
    }

    function droneNext() {
        droneChord=droneGen();
        if (dronePlaying){dronePlay(droneChord); droneStartTimer();}
        droneUpdateDisplay();
    }

    function droneUpdateDisplay() {
        const sym=document.getElementById('droneSymbol'), notes=document.getElementById('droneNotes');
        if (droneShow&&droneChord){sym.textContent=droneChord.sym;sym.classList.remove('hidden');notes.textContent=droneChord.notes;}
        else{sym.textContent='???';sym.classList.add('hidden');notes.textContent='';}
    }

    function droneStartTimer() {
        droneTimer&&clearInterval(droneTimer);
        droneTimeLeft=droneDur;
        droneTimer=setInterval(()=>{
            droneTimeLeft--;
            document.getElementById('droneStatus').textContent=`Next in ${droneTimeLeft}s`;
            if (droneTimeLeft<=0) droneNext();
        },1000);
    }

    document.querySelectorAll('.sound-btn').forEach(b=>{
        b.onclick=()=>{
            document.querySelectorAll('.sound-btn').forEach(x=>x.classList.remove('active'));
            b.classList.add('active'); droneSound=b.dataset.sound;
            if (dronePlaying&&droneChord) dronePlay(droneChord);
        };
    });

    document.querySelectorAll('.chord-check').forEach(cb=>{
        cb.onchange=e=>{ e.target.checked?droneEnabled.add(e.target.value):droneEnabled.delete(e.target.value); };
    });

    document.getElementById('droneStartBtn').onclick=()=>{
        if (!dronePlaying){
            droneInit();
            droneCtx.resume().then(()=>{
                dronePlaying=true;
                document.getElementById('droneStartBtn').textContent='Stop';
                droneNext();
            });
        } else {
            dronePlaying=false;
            document.getElementById('droneStartBtn').textContent='Start';
            droneStop(); droneTimer&&clearInterval(droneTimer);
            document.getElementById('droneStatus').textContent='Stopped';
        }
    };

    document.getElementById('droneShowBtn').onclick=()=>{
        droneShow=!droneShow;
        document.getElementById('droneShowBtn').classList.toggle('active');
        droneUpdateDisplay();
    };

    document.getElementById('durSlider').oninput=e=>{
        droneDur=+e.target.value;
        document.getElementById('durVal').textContent=droneDur;
    };
</script>

</body>
</html>
